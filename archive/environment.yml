name: vip-zarr-vizfold
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.10
  - setuptools=59.5.0   # pinned: newer versions break openfold's CUDA extension build
  - pip

  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - matplotlib
  - pillow
  - tqdm
  - psutil
  - PyYAML
  - typing-extensions
  - requests
  - biopython

  # Notebook / interactive workflow
  - jupyterlab
  - ipykernel

  # PyTorch with CUDA 12.4
  # CPU-only alternative — comment out the three lines below and uncomment these:
  # - pytorch
  # - torchvision
  # - cpuonly
  - pytorch::pytorch=2.5
  - pytorch::torchvision
  - pytorch::pytorch-cuda=12.4

  # OpenFold / Vizfold runtime dependencies
  # cuda provides nvcc + headers required to compile attn_core_inplace_cuda via setup.py
  - cuda
  - openmm
  - pdbfixer
  - pytorch-lightning
  - ml-collections
  - mkl
  - gcc=12.4

  # Zarr archive stack
  - zarr=2.16
  - numcodecs
  - fsspec

  - pip:
      # OpenFold extras
      - dm-tree==0.1.6
      - modelcif==0.7
      # Install openfold itself in editable mode from the repo root
      - -e ..